services:
  app:
    image: bysages/lens:latest
    restart: unless-stopped
    network_mode: host
    environment:
      # Node Environment
      NODE_ENV: production
      PORT: ${PORT:-3000}
      # Image Proxy Security
      ALLOWED_DOMAINS: ${ALLOWED_DOMAINS:-}
      # Caching (optional - configure your external Redis)
      REDIS_URL: ${REDIS_URL:-}
    healthcheck:
      test:
        ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:${PORT:-3000}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
